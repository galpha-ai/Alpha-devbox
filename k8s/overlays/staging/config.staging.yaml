assistant_name: Devbox

container:
  runtime: kubernetes
  image: your-registry/devbox-runner:latest
  timeout: 5400000
  idle_timeout: 300000
  max_concurrent: 2
  max_output_size: 10485760
  kubernetes:
    namespace: devbox-agent-staging
    pvc_name: devbox-data
    data_mount_path: /data/devbox-agent
    service_account: devbox-runner

web:
  enabled: true
  port: 8080

agents:
  - name: example
    path: agents/example

channels:
  # Uncomment and configure for your Slack workspace:
  # - id: "slack:YOUR_CHANNEL_ID"
  #   agents:
  #     - name: example
  #       trigger: "@Devbox"
  #       requires_trigger: true
  - id: "web:*"
    agents:
      - name: example
        requires_trigger: false
