name: Docker Build and Push

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'container/**'
      - 'docker/**'
      - 'agents/**'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

env:
  # Configure these for your container registry
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies and build TypeScript
        run: npm ci && npm run build

      - name: Build and push controller image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/controller.Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/controller:${{ steps.sha.outputs.short_sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/controller:latest
          cache-from: type=gha,scope=controller
          cache-to: type=gha,mode=max,scope=controller

      - name: Build and push runner image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/runner.Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/runner:${{ steps.sha.outputs.short_sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/runner:latest
          cache-from: type=gha,scope=runner
          cache-to: type=gha,mode=max,scope=runner

      - name: Summary
        run: |
          TAG="${{ steps.sha.outputs.short_sha }}"
          BASE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}"
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          ### Images pushed

          | Image | Tag |
          |-------|-----|
          | \`${BASE}/controller\` | \`${TAG}\` |
          | \`${BASE}/runner\` | \`${TAG}\` |
          EOF
