assistant_name: Devbox
# telegram_bot_token: can also be set via TELEGRAM_BOT_TOKEN env var
# telegram_bot_token: "YOUR_BOT_TOKEN"
# slack_bot_token: can also be set via SLACK_BOT_TOKEN env var
# slack_bot_token: "xoxb-..."
# slack_app_token: can also be set via SLACK_APP_TOKEN env var
# slack_app_token: "xapp-..."

# Optional: override the default trigger regex (default: ^@<assistant_name>\b)
# trigger_pattern: "^@Devbox\\b"

# Optional: override detected system timezone
# timezone: America/New_York

# Optional: runtime data directory (default: current working directory)
# data_root: /data/devbox-agent

container:
  runtime: docker         # docker | kubernetes
  image: devbox-runner:latest
  timeout: 5400000        # 90 min hard timeout per container
  idle_timeout: 300000    # 5 min idle before closing stdin
  max_concurrent: 2
  max_output_size: 10485760  # 10 MB
  # kubernetes:
  #   namespace: devbox-agent
  #   kubeconfig: ~/.kube/config
  #   pvc_name: devbox-data
  #   data_mount_path: /data/devbox-agent
  #   service_account: devbox-runner
  #   image_pull_policy: IfNotPresent

agents:
  - name: example
    path: agents/example

channels:
  - id: "tg:-100XXXXXXXXXX"
    agents:
      - name: example
        trigger: "@Devbox"
        requires_trigger: false

  # Optional: default mapping for Telegram DMs.
  # Private chat sessions are scoped per user as tg:user:<telegram_user_id>.
  - id: "tg:user:*"
    agents:
      - name: example
        requires_trigger: false

  # Optional: Slack channel/thread support.
  # Thread replies in this channel are isolated by thread_ts.
  - id: "slack:C0123456789"
    agents:
      - name: example
        trigger: "@Devbox"
        requires_trigger: true
